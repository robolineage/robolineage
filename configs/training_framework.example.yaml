name: generic_training_framework
framework_type: generic
adapter_version: "0.2"
repo_root: /path/to/existing/training/repo

# This profile is normally generated by FrameworkDiscoveryAgent from user-
# provided commands. It is checked in only as a readable example.
staging:
  selected_rollouts_file: "{staging_dir}/selected_rollouts.json"

# RoboLineage does not require the host repository to adopt RoboLineage internals. It stages
# accepted rollouts as a manifest, then calls the repository's existing
# dataset, training and evaluation code. Directory symlinks are only needed
# for legacy commands that explicitly use {framework_input_dir}.
dataset_command:
  cwd: "{repo_root}"
  args:
    - python
    - scripts/build_dataset.py
    - --input
    - "{selected_rollouts_file}"
    - --output
    - "{dataset_output}"

train_command:
  cwd: "{repo_root}"
  args:
    - python
    - train.py
    - --dataset
    - "{dataset_output}"
    - --output
    - "{checkpoint_dir}"

eval_command:
  cwd: "{repo_root}"
  args:
    - python
    - eval.py
    - --checkpoint
    - "{checkpoint_path}"
    - --output
    - "{eval_output}"

outputs:
  checkpoint_glob: "{checkpoint_dir}/*"
  train_log: "{checkpoint_dir}/training.log"
  eval_result: "{eval_output}/result.json"

# Prefer JSONL logs from the host repo. Regex patterns are the lightweight
# fallback for existing scripts that already print plain-text progress.
log_patterns:
  step: "step=(\\d+)"
  loss: "loss=([0-9.]+)"
  success_rate: "success_rate=([0-9.]+)"
